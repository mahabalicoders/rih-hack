name: Deploy to Firebase
on:
  push:
    branches:
      - main
      - Apex
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync Frontend
        run: cp index.html public/index.html

      - name: Install Functions Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r functions/requirements.txt

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --project credit-iq-baa91 --only hosting,functions --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
        # Alternatively, if using Service Account:
        # env:
        #   GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARTHASHAKTI }}
