        :root {
            --sidebar-width: 260px;
            --bg-page: #f8fafc;
            --bg-sidebar: #ffffff;
            --border-color: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --accent: #0f172a;
            --accent-glow: rgba(15, 23, 42, 0.05);
            --nav-active-bg: #0f172a;
            --nav-active-text: #ffffff;
            --border-thin: 1px solid var(--border-color);
            --radius-lg: 24px;
            --radius-md: 20px;
            --radius-sm: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 12px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-premium: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 5px 15px -5px rgba(0, 0, 0, 0.02);

        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        h1,
        h2,
        h3 {
            letter-spacing: -0.03em;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            :root {
                --sidebar-width: 80px;
            }

            .user-info,
            .logo-text,
            .nav-text {
                display: none;
            }

            .sidebar {
                padding: 32px 12px;
            }

            .nav-item {
                justify-content: center;
                padding: 12px;
            }

        @media (max-width: 768px) {

            .sidebar {

                border-top: var(--border-thin);
                flex-direction: row !important;
                align-items: center;
                justify-content: space-around;
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(12px);
            }

            .sidebar-bottom,

                display: none !important;
            }

            .main-content {
                margin-left: 0 !important;
                padding: 0 !important;
                padding-bottom: 80px !important;
            }

            .nav-list {
                display: flex;
                flex-direction: row !important;

                margin: 0;
            }

            .nav-item {
                margin-bottom: 0;

                gap: 4px;
            }

            .nav-icon {
                width: 20px;
                height: 20px;
            }

            .nav-text {
                display: none;
            }

            .hero h1 {
                font-size: 32px !important;
                line-height: 1.1;
            }

            .hero {

            .landing-nav {

            }

            .feature-grid {

                gap: 24px !important;

            .stat-grid {

            .form-grid {

            flex-grow: 1;

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;

            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;

        .nav-item:hover {

            color: var(--text-main);
            transform: translateX(4px);

        .nav-item.active {
            background: var(--nav-active-bg);
            color: var(--nav-active-text);

        }

        .nav-icon {

            height: 18px;

        .active .nav-icon {

            opacity: 1;

        .sidebar-bottom {
            padding-top: 24px;
            border-top: var(--border-thin);
            display: flex;
            align-items: center;
            gap: 12px;
        }

            height: 32px;

            background: #eee;
            display: flex;
            align-items: center;

            font-size: 12px;
            font-weight: 600;

            min-height: 100vh;

            justify-content: space-between;

        }

        .current-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        .content-body {

        }

        .card {

            border-radius: var(--radius-md);

        .card:hover {

            box-shadow: var(--shadow-premium);

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            display: flex;
            flex-direction: column;
            gap: 8px;

        .stat-label {

            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-value {

            font-weight: 600;
            letter-spacing: -0.02em;

        .welcome-banner h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .welcome-banner p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Form Elements */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-section {
            margin-bottom: 32px;

        .section-label {

            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 16px;

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        input,
        select {
            height: 44px;
            border: var(--border-thin);
            border-radius: 10px;
            padding: 0 14px;
            font-size: 14px;
            width: 100%;
            outline: none;
            background: #fff;

        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(17, 17, 17, 0.05);
        }

        button {
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            height: 48px;
            padding: 0 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: var(--text-main);
            height: 48px;
            padding: 0 32px;
        }

        .btn-ghost:hover {
            background: #f8fafc;
            border-color: var(--border-color);
        }

        .btn-google {
            background: #fff;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            margin-top: 24px;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);

        table {

            border-collapse: collapse;

            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            padding: 12px 16px;
            border-bottom: var(--border-thin);

        td {

            font-size: 14px;

        tr:last-child td {

        }

        .badge {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;

        /* Charts */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        /* Results Display */
        .score-display {
            text-align: center;
            margin-bottom: 32px;
        }

        .score-main {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.06em;
            margin-bottom: 8px;
            margin-top: 16px;

            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            margin: 0 auto 12px;

        .factor-list {
            list-style: none;
            margin: 16px 0;

        .factor-item {
            font-size: 13px;

            margin-bottom: 8px;
            display: flex;
            gap: 8px;
        }

        .factor-item::before {
            content: "•";
            color: #ddd;
        }

        /* Training Screen (re-used with minor polish) */
        #training-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: white;
        }

        .progress-box {
            width: 280px;
            text-align: center;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: #111;
            transition: width 0.1s linear;
        }

        /* Landing Page Specifics */
        .landing-nav {
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
            background: #fff;
            border-bottom: var(--border-thin);
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .hero {
            padding: 120px 80px;
            text-align: center;
            background: radial-gradient(circle at top, #fafafa 0%, #ffffff 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;

        }

        .hero::before {
            content: "";

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            pointer-events: none;
        }

        .hero h1 {
            font-size: 80px;
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 0.95;
            margin-bottom: 32px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            background: linear-gradient(180deg, #111 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 20px;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto 48px;
            line-height: 1.6;
            font-weight: 450;
            letter-spacing: -0.01em;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            padding: 80px;
            background: #fafafa;
        }

        .feature-card {
            text-align: left;
        }

        .feature-card .icon-box {
            width: 48px;
            height: 48px;
            background: #111;
            color: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .feature-card h3 {
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .feature-card p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .footer {
            padding: 60px 80px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;

        .trusted-by {
            padding: 40px 0;
            text-align: center;
            border-bottom: var(--border-thin);
        }

        .trusted-by span {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-light);
            display: block;
            margin-bottom: 24px;
        }

        .logos-flex {
            display: flex;
            justify-content: center;
            gap: 60px;
            opacity: 0.4;
            filter: grayscale(1);
        }

        @media (max-width: 850px) {

            .landing-nav,
            .hero,
            .feature-grid,
            .footer {
                padding: 40px 20px;
            }

            .hero h1 {
                font-size: 40px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            .logos-flex {
                gap: 24px;
                flex-wrap: wrap;
            }

            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyC5pe8gt-XTlkcBERxSVrbuxJcNbilIVw4",
            authDomain: "credit-iq-baa91.firebaseapp.com",
            projectId: "credit-iq-baa91",
            storageBucket: "credit-iq-baa91.firebasestorage.app",
            messagingSenderId: "31663798764",
            appId: "1:31663798764:web:d1ce015657133a0e9768c9",
            measurementId: "G-HGYNZ30ZV1"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const analytics = firebase.analytics();
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Icon Component (Now powered by Iconify) ---
        const Icon = ({ name, size = 18, className = "", color = "currentColor" }) => {
            const iconMap = {
                'Brain': 'ph:brain-bold',
                'LayoutGrid': 'ph:squares-four-bold',
                'PlusCircle': 'ph:plus-circle-bold',
                'Clock': 'ph:clock-bold',
                'BarChart3': 'ph:chart-bar-bold',
                'User': 'ph:user-bold',
                'Zap': 'ph:lightning-bold',
                'ShieldCheck': 'ph:shield-check-bold',
                'TrendingUp': 'ph:trend-up-bold',
                'Search': 'ph:magnifying-glass-bold',
                'ChartBar': 'ph:chart-line-up-bold'
            };
            const iconId = iconMap[name] || name;
            return <span className={`iconify ${className}`} data-icon={iconId} style={{ fontSize: size, color: color, display: 'inline-block', verticalAlign: 'middle' }}></span>;
        };
        const Icons = {
            Zap: (props) => <Icon name="Zap" {...props} />,
            Shield: (props) => <Icon name="ShieldCheck" {...props} />,
            Trend: (props) => <Icon name="TrendingUp" {...props} />,
            Target: (props) => <Icon name="Target" {...props} />
        };
        const BUSINESS_TYPES = [
            "Farm / Agri Business",
            "Construction Contractor",
            "Small Manufacturer",
            "Kirana / Retail Store",
            "Dhaba / Restaurant",
            "Medical Shop / Clinic",
            "Consultant / CA Firm",
            "Repair / General Services"
        ];
        const LOAN_HISTORY_STATUS = ["None", "Good", "Bad"];

        const MAX_VALS = {
            revenue: 500000,
            txn_count: 200,
            consistency: 10,
            has_website: 1,
            social_score: 10,
            years_in_business: 20,
            expense_ratio: 1,
            loan_history: 2,
            business_type: 3
        };

        const THEME_COLORS = {
            primary: '#111111',
            secondary: '#d4d4d4',
            warning: '#f59e0b',
            danger: '#ef4444',
            success: '#22c55e',
            gray: '#ebebeb'
        };

        // --- Helper Logic ---
        function calculateScore(data) {
            const { revenue, txn_count, consistency, has_website, social_score, years_in_business, expense_ratio, loan_history } = data;
            let val = (
                (revenue / 500000) * 25 +
                (txn_count / 200) * 15 +
                (consistency / 10) * 20 +
                (has_website ? 5 : 0) +
                (social_score / 10) * 10 +
                (years_in_business / 20) * 10 +
                (1 - expense_ratio) * 10 +
                (loan_history === 1 ? 5 : loan_history === 2 ? -10 : 0)
            );
            return Math.min(100, Math.max(0, val));
        }

        function getMetaFromScore(s) {
            if (s >= 80) return { grade: 'A', color: THEME_COLORS.success, risk: 'Low', rec: 'Highly eligible for priority financing.' };
            if (s >= 65) return { grade: 'B', color: THEME_COLORS.warning, risk: 'Medium-Low', rec: 'Eligible for standard loans. Focus on consistency.' };
            if (s >= 50) return { grade: 'C', color: THEME_COLORS.warning, risk: 'Medium', rec: 'Moderate eligibility. Improved cash flow recommended.' };
            if (s >= 35) return { grade: 'D', color: THEME_COLORS.danger, risk: 'High', rec: 'Limited financing options. Strengthen business tenure.' };
            return { grade: 'F', color: THEME_COLORS.danger, risk: 'Very High', rec: 'High risk profile. Strengthening documentation is advised.' };
        }

        // --- Components ---


        const Sidebar = ({ activePage, setPage, user, onLogout }) => (
            <div className="sidebar">
                <div className="logo-container">
                    <Icon name="Brain" size={24} />
                    <span>Arthashakti</span>
                </div>
                <nav className="nav-list">
                    <div className={`nav-item ${activePage === 'dashboard' ? 'active' : ''}`} onClick={() => setPage('dashboard')}>
                        <Icon name="LayoutGrid" /> Dashboard
                    </div>

        const DashboardPage = ({ history, user }) => {
            const chartLeftRef = useRef(null);
            const chartRightRef = useRef(null);

            const stats = useMemo(() => {
                if (history.length === 0) return { total: 0, avg: 0, highRisk: 0, last: '-' };
                const total = history.length;
                const avg = Math.round(history.reduce((a, b) => a + b.score, 0) / total);
                const highRisk = history.filter(h => h.score < 35).length;
                const last = history[0].date;
                return { total, avg, highRisk, last };
            }, [history]);

            useEffect(() => {
                if (!chartLeftRef.current || !chartRightRef.current) return;

                const trendCtx = chartLeftRef.current.getContext('2d');
                const riskCtx = chartRightRef.current.getContext('2d');

                const latest5 = [...history].reverse().slice(-7);
                const trendChart = new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: latest5.map((_, i) => `#${i + 1}`),
                        datasets: [{
                            label: 'Score History',
                            data: latest5.map(h => h.score),
                            borderColor: '#111',
                            tension: 0.3,
                            fill: false,
                            pointRadius: 4,
                            pointBackgroundColor: '#111'
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { min: 0, max: 100 } }
                    }
                });

                const riskGroups = { "Low": 0, "Medium": 0, "High": 0, "Very High": 0 };
                history.forEach(h => {
                    if (h.score >= 75) riskGroups["Low"]++;
                    else if (h.score >= 50) riskGroups["Medium"]++;
                    else if (h.score >= 30) riskGroups["High"]++;
                    else riskGroups["Very High"]++;
                });

                const riskChart = new Chart(riskCtx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(riskGroups),
                        datasets: [{
                            data: Object.values(riskGroups),
                            backgroundColor: [THEME_COLORS.success, THEME_COLORS.warning, THEME_COLORS.danger, '#666'],
                            borderWidth: 0
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
                });

                return () => { trendChart.destroy(); riskChart.destroy(); };
            }, [history]);

            return (
                <div className="flex-col">
                    <div className="welcome-banner">
                        <h1>Good morning, {user}</h1>
                        <p>Here is what's happening with your risk portfolio today.</p>
                    </div>

                    <div className="stat-grid">
                        <div className="card stat-card">
                            <span className="stat-label">TOTAL ASSESSMENTS</span>
                            <span className="stat-value">{stats.total}</span>
                        </div>
                        <div className="card stat-card">
                            <span className="stat-label">AVERAGE SCORE</span>
                            <span className="stat-value">{stats.avg}</span>
                        </div>
                        <div className="card stat-card">
                            <span className="stat-label">HIGH RISK ALERTS</span>
                            <span className="stat-value" style={{ color: stats.highRisk > 0 ? THEME_COLORS.danger : 'inherit' }}>{stats.highRisk}</span>
                        </div>
                        <div className="card stat-card">
                            <span className="stat-label">LAST ASSESSMENT</span>
                            <span className="stat-value" style={{ fontSize: '18px' }}>{stats.last}</span>
                        </div>
                    </div>

                    <div className="analytics-grid" style={{ marginBottom: '32px' }}>
                        <div className="card">
                            <span className="section-label">Score Trend</span>
                            <div className="chart-container">
                                <canvas ref={chartLeftRef}></canvas>
                            </div>
                        </div>
                        <div className="card">
                            <span className="section-label">Risk Distribution</span>
                            <div className="chart-container">
                                <canvas ref={chartRightRef}></canvas>
                            </div>
                        </div>
                    </div>

                    <div className="card" style={{ marginTop: '24px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                            <span className="section-label" style={{ marginBottom: 0 }}>Quick Actions</span>
                            <div className="flex gap-4">
                                <button className="btn-ghost" style={{ height: '36px', padding: '0 12px', fontSize: '11px' }} onClick={() => setPage('assessment')}>NEW AUDIT</button>
                                <button className="btn-ghost" style={{ height: '36px', padding: '0 12px', fontSize: '11px' }}>EXPORT PDF</button>
                            </div>
                        </div>
                        <div className="flex gap-6">
                            <div style={{ flex: 1, padding: '16px', background: '#fcfcfc', border: '0.5px solid #eee', borderRadius: '8px' }}>
                                <span style={{ fontSize: '11px', color: '#999', display: 'block' }}>SYSTEM STATUS</span>
                                <div className="flex items-center gap-2" style={{ marginTop: '4px' }}>
                                    <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#22c55e' }}></div>
                                    <span style={{ fontSize: '13px', fontWeight: 600 }}>AI Engine Active</span>
                                </div>
                            </div>
                            <div style={{ flex: 1, padding: '16px', background: '#fcfcfc', border: '0.5px solid #eee', borderRadius: '8px' }}>
                                <span style={{ fontSize: '11px', color: '#999', display: 'block' }}>FIREBASE SYNC</span>
                                <div className="flex items-center gap-2" style={{ marginTop: '4px' }}>
                                    <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#22c55e' }}></div>
                                    <span style={{ fontSize: '13px', fontWeight: 600 }}>Cloud Storage Online</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card" style={{ marginTop: '24px' }}>
                        <span className="section-label">Recent Assessments</span>
                        <table>
                            <thead>
                                <tr>
                                    <th>Business Type</th>
                                    <th>Score</th>
                                    <th>Grade</th>
                                    <th>Risk Level</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                {history.slice(0, 5).map((h, i) => (
                                    <tr key={i}>
                                        <td style={{ fontWeight: 500 }}>{BUSINESS_TYPES[h.business_type]}</td>
                                        <td>{h.score}</td>
                                        <td><span className="badge" style={{ background: `${h.color}11`, color: h.color, border: `0.5px solid ${h.color}` }}>{h.grade}</span></td>
                                        <td style={{ color: h.color, fontWeight: 500 }}>{h.risk}</td>
                                        <td style={{ color: THEME_COLORS.textMuted }}>{h.date}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const AssessmentPage = ({ user, onSave }) => {
            const [formData, setFormData] = useState({
                term: 12, employees: 5, loan_amount_inr: 50000, business_type: 0,
                is_urban: 1, is_existing: 1, upi_monthly_txn: 45, gst_registered: 1,
                gst_filing_score: 8, whatsapp_business: 1, has_website: 1,
                social_score: 7, mobile_banking_score: 8, aadhaar_linked: 1
            });
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleInp = (e) => {
                const { name, value } = e.target;
                const finalValue = name === 'business_type' ? parseInt(value) : parseFloat(value);
                setFormData(p => ({ ...p, [name]: finalValue }));
            };

            const runInference = async () => {
                setLoading(true);
                try {
                    const API_URL = 'https://mahabali077-arthshakti.hf.space/score';
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                    const data = await response.json();

                    if (data.status === 'success') {
                        const scoreColor = data.score >= 80 ? THEME_COLORS.success : data.score >= 50 ? THEME_COLORS.warning : THEME_COLORS.danger;

                        // Rule-based risk drivers logic
                        const getDrivers = (d, s) => {
                            const drv = [];
                            // Negative
                            if (d.gst_filing_score < 5) drv.push('Low GST filing compliance score');
                            if (d.upi_monthly_txn < 20) drv.push('Low UPI transaction volume');
                            if (d.mobile_banking_score < 5) drv.push('Limited mobile banking activity');
                            if (d.loan_amount_inr > 300000) drv.push('High loan amount relative to profile');
                            if (!d.gst_registered) drv.push('Business not GST registered');
                            if (!d.has_website) drv.push('No digital web presence');
                            if (d.term > 60) drv.push('Long repayment tenure requested');

                            // Positive
                            if (d.gst_filing_score >= 7) drv.push('Strong GST compliance history');
                            if (d.upi_monthly_txn >= 50) drv.push('High UPI transaction activity');
                            if (d.mobile_banking_score >= 7) drv.push('Active mobile banking user');
                            if (d.aadhaar_linked) drv.push('Aadhaar verified identity');
                            if (d.has_website) drv.push('Established web presence');
                            if (d.whatsapp_business) drv.push('Active WhatsApp Business user');
                            if (d.is_existing) drv.push('Existing business with track record');
                            if (d.social_score >= 7) drv.push('Strong social media presence');

                            // Fill if empty or short
                            while (drv.length < 3) drv.push(s >= 50 ? 'Stable financial outlook' : 'Risk mitigation recommended');
                            return drv.slice(0, 3);
                        };

                        const sectorSchemes = {
                            0: 'NABARD NWR Pledge Loan',
                            1: 'MSME Business Loan / PSL',
                            2: 'CGTMSE Collateral Free Loan',
                            3: 'PMMY Tarun Plus',
                            4: 'PMMY Tarun',
                            5: 'Healthcare PSL Target Loan',
                            6: 'Professional Business Loan',
                            7: 'PMMY Shishu / Kishore'
                        };

                        const getLoanRecommendation = (grade, requestedAmount, businessType) => {
                            const SECTOR_MAX = { 0: 7500000, 1: 10000000, 2: 2000000, 3: 2000000, 4: 2000000, 5: 5000000, 6: 5000000, 7: 500000 };
                            const SECTOR_SCHEMES = {
                                0: 'NABARD NWR Pledge Loan', 1: 'MSME Business Loan / PSL', 2: 'CGTMSE Collateral Free Loan',
                                3: 'PMMY Tarun Plus', 4: 'PMMY Tarun', 5: 'Healthcare PSL Target Loan',
                                6: 'Professional Business Loan', 7: 'PMMY Shishu / Kishore'
                            };
                            const GRADE_PERCENTAGE = { 'A': 1.0, 'B': 0.75, 'C': 0.5, 'D': 0.2, 'F': 0 };
                            const RATES = { 'A': '8.5-11%', 'B': '12-15%', 'C': '16-20%', 'D': '22-26%', 'F': 'N/A' };
                            const TENURE = { 'A': 36, 'B': 24, 'C': 18, 'D': 12, 'F': 0 };
                            const LENDER = {
                                'A': 'PSU Bank (SBI/PNB)', 'B': 'Private Bank (HDFC/ICICI)', 'C': 'NBFC (Bajaj Finance)',
                                'D': 'Microfinance Institution', 'F': 'Not Eligible'
                            };
                            const DECISIONS = { 'A': 'APPROVED', 'B': 'APPROVED', 'C': 'REVIEW', 'D': 'REVIEW', 'F': 'REJECTED' };

                            if (grade === 'F') return {
                                amount: 0, amountFormatted: 'Not Eligible', scheme: 'N/A', rate: 'N/A',
                                tenure: 0, tenureFormatted: 'N/A', lender: 'Not Eligible', decision: 'REJECTED',
                                requestedFormatted: '₹' + requestedAmount.toLocaleString('en-IN'), approvedPct: '0%'
                            };

                            const pct = GRADE_PERCENTAGE[grade];
                            const finalAmount = Math.min(Math.round(requestedAmount * pct), SECTOR_MAX[businessType] || 500000);
                            const tenureMonths = TENURE[grade];

                            return {
                                amount: finalAmount,
                                amountFormatted: '₹' + finalAmount.toLocaleString('en-IN'),
                                scheme: SECTOR_SCHEMES[businessType],
                                rate: RATES[grade],
                                tenure: tenureMonths,
                                tenureFormatted: tenureMonths + ' months',
                                lender: LENDER[grade],
                                decision: DECISIONS[grade],
                                requestedFormatted: '₹' + (parseInt(requestedAmount) || 0).toLocaleString('en-IN'),
                                approvedPct: Math.round(pct * 100) + '%'
                            };
                        };

                        const loanRec = getLoanRecommendation(data.grade, parseInt(formData.loan_amount_inr), parseInt(formData.business_type));

                        const calculateBankBenefit = (amt, rateStr, tenureStr, defProb) => {
                            if (rateStr === 'N/A') return null;
                            const approvedAmount = amt;
                            const tenureMonths = parseInt(tenureStr.split(' ')[0]) || 0;
                            const parts = rateStr.replace('%', '').split('-');
                            const avgRate = (parseFloat(parts[0]) + parseFloat(parts[1])) / 2 / 100;

                            const totalInterest = Math.round(approvedAmount * avgRate * (tenureMonths / 12));
                            const expectedLoss = Math.round(approvedAmount * (defProb / 100) * 0.6);
                            const netBenefit = totalInterest - expectedLoss;
                            const rol = ((netBenefit / approvedAmount) * 100).toFixed(1);

                            return {
                                totalInterest: '₹' + totalInterest.toLocaleString('en-IN'),
                                expectedLoss: '₹' + expectedLoss.toLocaleString('en-IN'),
                                netBenefit: '₹' + netBenefit.toLocaleString('en-IN'),
                                returnOnLoan: rol + '%',
                                worthIt: netBenefit > 0
                            };
                        };

                        const res = {
                            ...formData,
                            score: data.score,
                            grade: data.grade,
                            risk: data.risk,
                            color: scoreColor,
                            loan: loanRec,
                            benefit: calculateBankBenefit(loanRec.amount, loanRec.rate, loanRec.tenureFormatted, data.default_probability),
                            default_probability: data.default_probability,
                            reasons: getDrivers(formData, data.score),
                            date: new Date().toLocaleDateString('en-GB'),
                            created_at: firebase.firestore.FieldValue.serverTimestamp(),
                            user_id: auth.currentUser ? auth.currentUser.uid : 'anon'
                        };

                        // Save to Firestore
                        try {
                            await db.collection('assessments').add(res);
                            console.log("Assessment stored in Firestore");
                        } catch (e) {
                            console.error("Firestore Error:", e);
                        }

                        setResult(res);
                    } else {
                        alert("Backend Error: " + data.message);
                    }
                } catch (err) {
                    console.error("API Error:", err);
                    alert("Could not connect to SiliconMind Backend. Make sure your Python server is running.");
                } finally {
                    setLoading(false);
                }
            };

            const exportPDF = () => {
                try {
                    const { jsPDF } = window.jspdf || window;
                    const doc = new jsPDF();
                    const primaryColor = [17, 24, 39]; // #111827
                    const accentColor = [67, 56, 202]; // Indigo
                    const successColor = [34, 197, 94]; // Green
                    const dangerColor = [239, 68, 68]; // Red
                    const cardBg = [248, 250, 252];

                    // --- HEADER ---
                    doc.setFillColor(...primaryColor);
                    doc.rect(0, 0, 210, 45, 'F');

                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(26);
                    doc.setFont("helvetica", "bold");
                    doc.text("ARTHASHAKTI", 20, 25);

                    doc.setFontSize(10);
                    doc.setFont("helvetica", "normal");
                    doc.text("Bharat Fintech v1.0 | AI Credit Assessment", 20, 34);

                    doc.setFontSize(10);
                    doc.text(`REPORT ID: AS-${Date.now().toString().slice(-6)}`, 150, 25);
                    doc.text(`DATE: ${result.date} | ${new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}`, 150, 31);
                    doc.text(`ANALYST: ${user.toUpperCase() || 'SYSTEM'}`, 150, 37);

                    // --- CREDIT SCORE CARD ---
                    doc.setTextColor(...primaryColor);
                    doc.setFontSize(14);
                    doc.text("CREDIT VERDICT", 20, 65);
                    doc.line(20, 68, 190, 68);

                    doc.setFillColor(...cardBg);
                    doc.roundedRect(20, 75, 170, 40, 3, 3, 'F');

                    doc.setFontSize(28);
                    const scoreColor = result.score >= 70 ? successColor : (result.score >= 40 ? [245, 158, 11] : dangerColor);
                    doc.setTextColor(...scoreColor);
                    doc.text(`${result.score}`, 35, 103);

                    doc.setTextColor(...primaryColor);
                    doc.setFontSize(10);
                    doc.text("SILICONMIND SCORE", 35, 87);

                    doc.setFontSize(16);
                    doc.setFont("helvetica", "bold");
                    doc.text(`GRADE ${result.grade}`, 110, 95);

                    doc.setFontSize(10);
                    doc.setFont("helvetica", "normal");
                    doc.text(`${result.risk.toUpperCase()} RISK PROFILE`, 110, 102);

                    // --- LOAN RECOMMENDATION ---
                    doc.setFontSize(14);
                    doc.setFont("helvetica", "bold");
                    doc.text("LOAN RECOMMENDATION", 20, 135);
                    doc.line(20, 138, 190, 138);

                    const details = [
                        { l: "Approved Amount", v: result.loan.amountFormatted },
                        { l: "Applicable Scheme", v: result.loan.scheme },
                        { l: "Interest Rate", v: result.loan.rate },
                        { l: "Repayment Tenure", v: result.loan.tenureFormatted },
                        { l: "Recommended Lender", v: result.loan.lender }
                    ];

                    doc.setFontSize(11);
                    details.forEach((item, i) => {
                        doc.setFont("helvetica", "bold");
                        doc.text(item.l, 25, 150 + (i * 10));
                        doc.setFont("helvetica", "normal");
                        doc.text(`: ${item.v}`, 80, 150 + (i * 10));
                    });

                    // --- RISK DRIVERS ---
                    doc.setFontSize(14);
                    doc.setFont("helvetica", "bold");
                    doc.text("RISK DRIVERS", 20, 210);
                    doc.line(20, 213, 190, 213);

                    doc.setFontSize(11);
                    doc.setFont("helvetica", "italic");
                    result.reasons.forEach((r, i) => {
                        doc.text(`- ${r}`, 25, 225 + (i * 8));
                    });

                    // --- FOOTER ---
                    doc.setFontSize(8);
                    doc.setTextColor(150, 150, 150);
                    doc.setFont("helvetica", "normal");
                    doc.text("Disclaimer: This is an AI-generated report by SiliconMind Engine. Final credit decisions rest with the institutional authorities.", 20, 280);
                    doc.text("CONFIDENTIAL • ARTHASHAKTI BHARAT FINTECH", 148, 285);

                    doc.save(`Arthashakti_Report_${Date.now()}.pdf`);
                } catch (err) {
                    console.error("PDF Export Error:", err);
                    alert("Could not generate PDF. Check console for details.");
                }
            };

            return (
                <div className="form-grid">
                    <div className="card">
                        <span className="section-label">SiliconMind Assessment</span>

                        <div className="form-section">
                            <span style={{ fontSize: '11px', color: '#999', marginBottom: '16px', display: 'block' }}>CORE LOAN DETAILS</span>
                            <div className="form-grid" style={{ gap: '12px' }}>
                                <div className="form-group">
                                    <label>Loan Amount (₹)</label>
                                    <input name="loan_amount_inr" type="number" value={formData.loan_amount_inr} onChange={handleInp} />
                                </div>
                                <div className="form-group">
                                    <label>Term (Months)</label>
                                    <input name="term" type="number" value={formData.term} onChange={handleInp} />
                                </div>
                                <div className="form-group">
                                    <label>Employees</label>
                                    <input name="employees" type="number" value={formData.employees} onChange={handleInp} />
                                </div>
                                <div className="form-group">
                                    <label>Business Type</label>
                                    <select name="business_type" value={formData.business_type} onChange={handleInp}>
                                        {BUSINESS_TYPES.map((t, idx) => <option key={t} value={idx}>{t}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div className="form-section">
                            <span style={{ fontSize: '11px', color: '#999', marginBottom: '16px', display: 'block' }}>ALTERNATIVE TRANSACTION DATA</span>
                            <div className="form-grid" style={{ gap: '12px' }}>
                                <div className="form-group">
                                    <label>UPI Monthly Txns</label>
                                    <input name="upi_monthly_txn" type="number" value={formData.upi_monthly_txn} onChange={handleInp} />
                                </div>
                                <div className="form-group">
                                    <label>GST Filing Score (1-10)</label>
                                    <input name="gst_filing_score" type="number" min="0" max="10" value={formData.gst_filing_score} onChange={handleInp} />
                                </div>
                                <div className="form-group">
                                    <label>GST Registered?</label>
                                    <select name="gst_registered" value={formData.gst_registered} onChange={handleInp}>
                                        <option value={1}>Yes</option>
                                        <option value={0}>No</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Mobile Banking Score</label>
                                    <input name="mobile_banking_score" type="number" value={formData.mobile_banking_score} onChange={handleInp} />
                                </div>
                            </div>
                        </div>

                        <div className="form-section">
                            <span style={{ fontSize: '11px', color: '#999', marginBottom: '16px', display: 'block' }}>IDENTITY & DIGITAL FOOTPRINT</span>
                            <div className="form-grid" style={{ gap: '12px', gridTemplateColumns: 'repeat(3, 1fr)' }}>
                                <div className="form-group"><label>Urban?</label><select name="is_urban" value={formData.is_urban} onChange={handleInp}><option value={1}>Yes</option><option value={0}>No</option></select></div>
                                <div className="form-group"><label>Existing?</label><select name="is_existing" value={formData.is_existing} onChange={handleInp}><option value={1}>Yes</option><option value={0}>No</option></select></div>
                                <div className="form-group"><label>WhatsApp Biz?</label><select name="whatsapp_business" value={formData.whatsapp_business} onChange={handleInp}><option value={1}>Yes</option><option value={0}>No</option></select></div>
                                <div className="form-group"><label>Has Website?</label><select name="has_website" value={formData.has_website} onChange={handleInp}><option value={1}>Yes</option><option value={0}>No</option></select></div>
                                <div className="form-group"><label>Linked Aadhaar?</label><select name="aadhaar_linked" value={formData.aadhaar_linked} onChange={handleInp}><option value={1}>Yes</option><option value={0}>No</option></select></div>
                                <div className="form-group"><label>Social Score</label><input name="social_score" type="number" value={formData.social_score} onChange={handleInp} /></div>
                            </div>
                        </div>

                        <button onClick={runInference} disabled={loading} className="btn-primary w-full" style={{ marginTop: '12px' }}>
                            {loading ? "Analyzing SiliconMind Patterns..." : "Calculate Risk Score"}
                        </button>
                    </div>

                    <div>
                        {result ? (
                            <div className="card">
                                <span className="section-label" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    SiliconMind Prediction
                                    <button onClick={exportPDF} style={{ padding: '4px 12px', fontSize: '11px' }} className="btn-ghost">Export PDF</button>
                                </span>
                                <div className="score-display">
                                    <div className="score-main" style={{ color: result.color }}>

            };

            return (
                <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#f8fafc' }}>
                    <div className="card" style={{ width: '380px', textAlign: 'center' }}>
                        <div className="logo-container" style={{ justifyContent: 'center', marginBottom: '8px' }}>
                            <Icon name="Brain" size={32} /> <span>Arthashakti</span>
                        </div>
                        <h2 style={{ fontSize: '20px', marginBottom: '8px' }}>Welcome Back</h2>
                        <p style={{ fontSize: '13px', color: '#64748b', marginBottom: '24px' }}>Access your risk assessment dashboard</p>
                        <div className="form-group" style={{ textAlign: 'left' }}>
                            <label>Email</label>
                            <input value={email} onChange={e => setEmail(e.target.value)} placeholder="analyst@finance.com" />
                        </div>
                        <div className="form-group" style={{ textAlign: 'left', position: 'relative' }}>
                            <label>Password</label>
                            <input type={showPass ? "text" : "password"} value={pass} onChange={e => setPass(e.target.value)} placeholder="••••••••" />
                            <div onClick={() => setShowPass(!showPass)} style={{ position: 'absolute', right: '12px', top: '34px', cursor: 'pointer', opacity: 0.5 }}>
                                <Icon name={showPass ? "ph:eye-closed-bold" : "ph:eye-bold"} />
                            </div>
                        </div>
                        <button className="btn-primary w-full" onClick={handleLogin}>Log In</button>
                        <button className="btn-google" onClick={handleGoogle} style={{ marginTop: '12px' }}>
                            <span className="iconify" data-icon="logos:google-icon"></span> Continue with Google
                        </button>
                        <p style={{ marginTop: '24px', fontSize: '13px', color: '#64748b' }}>
                            Don't have an account? <span onClick={() => setPage('signup')} style={{ color: '#111', fontWeight: 700, cursor: 'pointer' }}>Sign up</span>
                        </p>
                    </div>
                </div>
            );
        };

        const SignupPage = ({ setPage, onLogin }) => {
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [showPass, setShowPass] = useState(false);

            const handleSignup = async () => {
                try {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await res.user.updateProfile({ displayName: name });
                    onLogin(name);
                } catch (e) { alert(e.message); }
            };

            return (
                <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#f8fafc' }}>
                    <div className="card" style={{ width: '380px', textAlign: 'center' }}>
                        <div className="logo-container" style={{ justifyContent: 'center', marginBottom: '8px' }}>
                            <Icon name="Brain" size={32} /> <span>Arthashakti</span>
                        </div>
                        <h2 style={{ fontSize: '20px', marginBottom: '8px' }}>Create Account</h2>
                        <p style={{ fontSize: '13px', color: '#64748b', marginBottom: '24px' }}>Start evaluating MSME risk with AI</p>
                        <div className="form-group" style={{ textAlign: 'left' }}>
                            <label>Full Name</label>
                            <input value={name} onChange={e => setName(e.target.value)} placeholder="John Doe" />
                        </div>
                        <div className="form-group" style={{ textAlign: 'left' }}>
                            <label>Email</label>
                            <input value={email} onChange={e => setEmail(e.target.value)} placeholder="analyst@finance.com" />
                        </div>
                        <div className="form-group" style={{ textAlign: 'left', position: 'relative' }}>
                            <label>Password</label>
                            <input type={showPass ? "text" : "password"} value={pass} onChange={e => setPass(e.target.value)} placeholder="••••••••" />
                            <div onClick={() => setShowPass(!showPass)} style={{ position: 'absolute', right: '12px', top: '34px', cursor: 'pointer', opacity: 0.5 }}>
                                <Icon name={showPass ? "ph:eye-closed-bold" : "ph:eye-bold"} />
                            </div>
                        </div>
                        <button className="btn-primary w-full" onClick={handleSignup}>Sign Up</button>
                        <p style={{ marginTop: '24px', fontSize: '13px', color: '#64748b' }}>
                            Already have an account? <span onClick={() => setPage('login')} style={{ color: '#111', fontWeight: 700, cursor: 'pointer' }}>Log in</span>
                        </p>
                    </div>
                </div>
            );
        };

        const TrainingScreen = ({ progress, isReady }) => (
            <div id="training-screen">
                <div className="progress-box">
                    <Icon name="Brain" />
                    <h2 style={{ marginTop: '12px', fontSize: '20px' }}>Arthashakti AI</h2>
                    <p style={{ fontSize: '14px', color: '#666', marginTop: '4px' }}>
                        {isReady ? 'Model calibration complete' : 'Training neural network in browser...'}
                    </p>
                    <div className="progress-bar-wrap">
                        <div className="progress-bar-fill" style={{ width: `${(progress / 50) * 100}%` }}></div>
                    </div>
                    <span style={{ fontSize: '11px', color: '#999' }}>Learning from 500 samples • Epoch {progress}/50</span>
                </div>
            </div>
        );

        // --- Main App ---

        const App = () => {
            const [page, setPage] = useState('landing');
            const [trainingProgress, setProgress] = useState(0);
            const [model, setModel] = useState(null);
            const [history, setHistory] = useState([]);
            const [user, setUser] = useState(null);
            const [isReady, setReady] = useState(false);

            useEffect(() => {
                if (!user || page === 'landing') return;

                // Real-time Firestore sync (Manual sort to avoid index errors)
                const unsubscribe = db.collection('assessments')
                    .where('user_id', '==', auth.currentUser.uid)
                    .onSnapshot(snap => {
                        let data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        // Sort locally to avoid needing a composite index in the Firebase console
                        data.sort((a, b) => {
                            const timeA = a.created_at ? a.created_at.seconds : 0;
                            const timeB = b.created_at ? b.created_at.seconds : 0;
                            return timeB - timeA;
                        });
                        setHistory(data);
                    }, err => console.error("Sync Error:", err));

                return () => unsubscribe();
            }, [user, page]);

            const renderContent = () => {
                // Public Routes
                if (page === 'landing') return <LandingPage onGetStarted={() => setPage('login')} />;
                if (page === 'login') return <LoginPage setPage={setPage} onLogin={(u) => { setUser(u); setPage('dashboard'); }} />;
                if (page === 'signup') return <SignupPage setPage={setPage} onLogin={(u) => { setUser(u); setPage('dashboard'); }} />;

                // Protected Route Logic
                if (!user) {
                    setPage('login');
                    return null;
                }

                // Private Routes
                switch (page) {
                    case 'dashboard': return <DashboardPage history={history} user={user} />;
                    case 'assessment': return <AssessmentPage user={user} model={model} onSave={(res) => { setHistory([res, ...history]); setPage('dashboard'); }} />;
                    case 'history': return <HistoryPage history={history} />;
                    case 'analytics': return <AnalyticsPage history={history} />;
                    case 'profile': return <ProfilePage user={user} />;
                    default: return <DashboardPage history={history} user={user} />;
                }
            };

            const isPublicPage = ['landing', 'login', 'signup'].includes(page);

            return (
                <div className="app-container" style={{ display: isPublicPage ? 'block' : 'flex', minHeight: '100vh' }}>
                    {!isPublicPage && user && (
                        <Sidebar activePage={page} setPage={setPage} user={user} onLogout={() => { auth.signOut(); setUser(null); setPage('landing'); }} />
                    )}
                    <div className="main-content" style={{
                        marginLeft: (isPublicPage || !user) ? '0' : 'var(--sidebar-width)',
                        width: '100%',
                        backgroundColor: (isPublicPage || !user) ? '#fff' : 'var(--bg-page)'
                    }}>
                        {!isPublicPage && user && (
                            <header className="top-bar">
                                <span className="page-title">{page.charAt(0).toUpperCase() + page.slice(1).replace('-', ' ')}</span>
                                <span className="current-date">{new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
                            </header>
                        )}
                        <div className="content-body" style={{
                            height: (isPublicPage || !user) ? '100%' : 'auto',
                            padding: '0'
                        }}>
                            {renderContent()}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
